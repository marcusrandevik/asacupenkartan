<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<title>Cupkarta — Fotbollscup</title>

<link href="https://unpkg.com/maplibre-gl@5/dist/maplibre-gl.css" rel="stylesheet" />
<script src="https://unpkg.com/maplibre-gl@5/dist/maplibre-gl.js"></script>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;700;900&family=Archivo+Expanded:wght@800;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />

<link href="styles.css" rel="stylesheet" />
</head>
<body>
<div id="map"></div>

<header>
  <div class="brand">
    <h1>Åsa<b>cupen</b></h1>
    <p>Hitta allt du behöver på Åsacupen 2026</p>
  </div>
</header>

<div class="search" id="search">
  <div class="bar">
    <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#5c6b50" stroke-width="2.4" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.5" y2="16.5"/></svg>
    <input id="search-input" type="text" placeholder="Sök plan, restaurang, toalett…" autocomplete="off" />
  </div>
  <ul id="search-results"></ul>
</div>

<div class="toast" id="toast"></div>

<details class="legend" open>
  <summary>Teckenförklaring <span class="chev">▾</span></summary>
  <ul>
    <li><span class="sw" style="background:#4f9a3a"></span> Plan</li>
    <li><span class="sw" style="background:#d4663b"></span> Mat &amp; restaurang</li>
    <li><span class="sw" style="background:#c9c2ac;border:1px solid #aaa28a"></span> Parkering</li>
    <li><span class="sw" style="background:#7a5a2e"></span> Gångväg</li>
    <li><span class="sw" style="background:#ffd200;border:1px solid #141414"></span> Din position</li>
  </ul>
</details>

<script src="app.js"></script>
</body>
</html>
